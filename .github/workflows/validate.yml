name: Task Validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      
      - name: Build environment image
        run: |
          cd hallucination-firewall-verifier
          docker build -f environment/Dockerfile -t firewall-env .
      
      - name: Build test image
        run: |
          cd hallucination-firewall-verifier
          docker build -f tests/Dockerfile -t firewall-test .
      
      - name: Run NOP validation (broken code should fail)
        run: |
          cd hallucination-firewall-verifier
          docker run --rm -v ${PWD}:/app firewall-test bash /app/tests/test.sh || true
      
      - name: Apply oracle solution
        run: |
          cd hallucination-firewall-verifier
          bash solution/solve.sh
      
      - name: Run oracle validation (fixed code should pass)
        run: |
          cd hallucination-firewall-verifier
          docker run --rm -v ${PWD}:/app firewall-test bash /app/tests/test.sh
